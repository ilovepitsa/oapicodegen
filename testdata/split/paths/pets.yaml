# Path items for /pets and /pets/{petId}.
# Referenced from openapi.yaml via $ref.
# Schema $refs point to schemas/*.yaml directly (cross-file).

PetsPath:
  get:
    operationId: listPets
    summary: List all pets
    parameters:
      - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100}}
    responses:
      '200':
        description: A list of pets
        content:
          application/json:
            schema:
              type: array
              items: {$ref: '../schemas/pet.yaml#/Pet'}
      '400':
        description: Bad request
        content:
          application/json:
            schema: {$ref: '../schemas/error.yaml#/Error'}
  post:
    operationId: createPet
    summary: Create a pet
    requestBody:
      required: true
      content:
        application/json:
          schema: {$ref: '../schemas/pet.yaml#/NewPet'}
    responses:
      '201':
        description: Pet created
        content:
          application/json:
            schema: {$ref: '../schemas/pet.yaml#/Pet'}
      '400':
        description: Bad request
        content:
          application/json:
            schema: {$ref: '../schemas/error.yaml#/Error'}

PetByIdPath:
  get:
    operationId: getPet
    summary: Get a pet by ID
    parameters:
      - {name: petId, in: path, required: true, schema: {type: string}}
    responses:
      '200':
        description: A pet
        content:
          application/json:
            schema: {$ref: '../schemas/pet.yaml#/Pet'}
      '404':
        description: Not found
        content:
          application/json:
            schema: {$ref: '../schemas/error.yaml#/Error'}
  delete:
    operationId: deletePet
    summary: Delete a pet by ID
    parameters:
      - {name: petId, in: path, required: true, schema: {type: string}}
    responses:
      '204':
        description: Pet deleted
