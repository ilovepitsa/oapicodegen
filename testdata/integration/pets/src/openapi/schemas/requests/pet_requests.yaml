CreatePetRequest:
  type: object
  properties:
    name: {type: string}
    species: {type: string}
    breed: {type: string, x-optional: true}
    age: {type: integer}
    tags:
      type: array
      items: {type: string}
    ownerId: {type: string}
  required: [name, species, ownerId]

UpdatePetRequest:
  type: object
  properties:
    name: {type: string}
    breed: {type: string}
    age: {type: integer}
    tags:
      type: array
      items: {type: string}
