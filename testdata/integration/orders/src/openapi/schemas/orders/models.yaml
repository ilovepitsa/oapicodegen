Order:
  type: object
  properties:
    id: {type: string, readOnly: true}
    userId: {type: string}
    items:
      type: array
      items: {$ref: '#/OrderItem'}
    status: {$ref: './../status/types.yaml#/OrderStatus'}
    total: {$ref: '#/OrderTotal'}
    shippingAddress: {$ref: '#/ShippingAddress'}
    createdAt: {type: string, format: date-time, readOnly: true}
  required: [userId, items]

OrderItem:
  type: object
  properties:
    productId: {type: string}
    quantity: {type: integer, x-validations: [">0"]}
    price: {$ref: '#/OrderTotal'}
  required: [productId, quantity, price]

OrderTotal:
  type: object
  properties:
    amount: {type: number}
    currency: {type: string, default: "RUB"}
  required: [amount, currency]

ShippingAddress:
  allOf:
    - type: object
      properties:
        street: {type: string}
        city: {type: string}
        zip: {type: string}
        country: {type: string}
      required: [street, city]
    - type: object
      properties:
        recipientName: {type: string}
        phone: {type: string}
