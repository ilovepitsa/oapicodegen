openapi: 3.0.3
info:
  title: UserBackend
  version: 1.0.0
paths:
  /users:
    get:
      operationId: ListUsers
      tags: [UserBackend]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
    post:
      operationId: CreateUser
      tags: [UserBackend]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: created
components:
  schemas:
    UserList:
      type: array
      items:
        type: string
    CreateUserRequest:
      type: object
      properties:
        user:
          $ref: '../../../common/src/openapi/openapi.yaml#/components/schemas/User'
